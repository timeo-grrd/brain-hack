                        <path d="M28 12L32 8M32 8L32 12M32 8L28 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M15 28C15 28 17 30 20 30C23 30 25 28 25 28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <span class="logo-text">brain<span class="logo-accent">Hack</span></span>

            <div class="nav-links">
                <a href="#histoire" class="nav-link">Histoire</a>
                <a href="games/" class="nav-link">Mini-jeux</a>

            <a href="#" class="btn btn-primary">
                <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                </svg>
                Mon compte

            <button class="mobile-menu-btn" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>
    
            <!-- Section Auth (affichée quand l'utilisateur est déconnecté) -->
            <section class="auth-section" id="authSection">
                <div class="auth-toggle">
                    <button class="btn btn-outline" id="showLogin">Connectez-vous</button>
                </div>
                
                <div class="auth-toggle-question">
                    <button class="btn btn-text" id="showRegisterQuestion">Êtes-vous inscrit ?</button>
                </div>

                <!-- Formulaire d'Inscription -->
                <div class="auth-form-container" id="registerForm">
                    <h2 class="auth-title">Inscription</h2>
                    <form class="auth-form" id="registerFormElement">
                        <div class="form-group">
                            <input type="text" class="form-input" placeholder="Votre pseudo" required>
                        </div>
                        <div class="form-group">
                            <input type="email" class="form-input" placeholder="Votre adresse mail" required>
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-input" placeholder="Votre rôle" required>
                        </div>
                        <div class="form-group role-selection">
                            <label class="radio-label">
                                <input type="radio" name="role" value="eleve" checked>
                                <span class="radio-custom"></span>
                                <span class="radio-text">Élève</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="role" value="professeur">
                                <span class="radio-custom"></span>
                                <span class="radio-text">Professeur</span>
                            </label>
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-input" placeholder="Votre mot de passe" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">S'inscrire</button>
                    </form>
                </div>

                <!-- Formulaire de Connexion -->
                <div class="auth-form-container hidden" id="loginForm">
                    <h2 class="auth-title">Connexion</h2>
                    <form class="auth-form" id="loginFormElement">
                        <div class="form-group">
                            <input type="text" class="form-input" placeholder="Votre pseudo ou adresse mail" required>
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-input" placeholder="Votre mot de passe" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
                        <a href="#" class="forgot-password">Mot de passe oublié ?</a>
                    </form>
                </div>
            </section>

        </div>
    </main>

            </svg>
        </div>
        <div class="footer-content">
            <div class="container">
                <div class="footer-grid">
                    <div class="footer-brand">
                        <a href="#" class="logo">

                                    <circle cx="20" cy="20" r="6" fill="currentColor"/>

                                    <path d="M15 28C15 28 17 30 20 30C23 30 25 28 25 28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span class="logo-text">brain<span class="logo-accent">Hack</span></span>
                        </a>
                    </div>
