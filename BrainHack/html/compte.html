<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrainHack - Tous comprendre sur l'IA</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="#" class="logo">
          <div class="logo-icon">
            <img
              src="../assets/logo.png"
              alt="Logo BrainHack"
              class="logo-img"
            />
          </div>
        </a>

        <div class="nav-links">
          <a href="#histoire" class="nav-link">Histoire</a>
          <a href="games.html" class="nav-link">Mini-jeux</a>
        </div>

        <a href="#" class="btn btn-primary">
          <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor">
            <path
              fill-rule="evenodd"
              d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
              clip-rule="evenodd"
            />
          </svg>
          Mon compte
        </a>

        <button class="mobile-menu-btn" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <main class="account-page">
      <div class="container">
        <section class="profile-section" id="profileSection">
          <h1 class="welcome-title">
            Bonjour, <span class="user-role">Élève</span>
            <span class="user-name">Lucas</span>
          </h1>

          <div class="profile-avatar">
            <div class="avatar-circle">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                />
              </svg>
            </div>
            <p class="pseudo-text">Pseudo</p>
          </div>

          <div class="medals-section">
            <h2>Vos médailles</h2>
            <div class="medals-grid">
              <div class="medal-item">
                <span class="medal-icon">👑</span>
              </div>
              <div class="medal-item">
                <span class="medal-icon">👑</span>
              </div>
              <div class="medal-item">
                <span class="medal-icon">👑</span>
              </div>
            </div>
          </div>

          <button class="btn btn-secondary" id="logoutBtn">Déconnexion</button>
        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-wave">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
          <path
            d="M0,64 C480,150 960,-20 1440,64 L1440,120 L0,120 Z"
            fill="#a8c6fa"
          />
        </svg>
      </div>
      <div class="footer-content">
        <div class="container">
          <div class="footer-grid">
            <div class="footer-brand">
              <a href="#" class="logo">
                <div class="logo-icon">
                  <img
                    src="../assets/logo.png"
                    alt="Logo BrainHack"
                    class="logo-img"
                  />
                </div>
              </a>
            </div>

            <div class="footer-links">
              <h4>Navigation</h4>
              <ul>
                <li><a href="#">Histoire</a></li>
                <li><a href="games.html">Mini-jeux</a></li>
              </ul>
            </div>

            <div class="footer-links">
              <h4>Contact Us</h4>
              <ul>
                <li>
                  <a href="mailto:contact@brainhack.fr">contact@brainhack.fr</a>
                </li>
                <li><a href="tel:+33123456789">+33 1 23 45 67 89</a></li>
              </ul>
            </div>

            <div class="footer-social">
              <h4>Suivez-nous</h4>
              <div class="social-links">
                <a href="#" aria-label="Facebook">
                  <svg class="social-icon">
                    <use href="#icon-facebook"></use>
                  </svg>
                </a>
                <a href="#" aria-label="Instagram">
                  <svg class="social-icon">
                    <use href="#icon-instagram"></use>
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script src="../js/script.js"></script>
  </body>
</html>
