version: "3.8"

services:
  # --- BACKEND .NET ---
  backend:
    build: ./backend_dotnet
    container_name: backend
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY} # <-- AJOUTE CETTE LIGNE ICI
    ports:
      - "5282:5282"
    # ... le reste ...
  # --- JEU 1 : IA ---
  jeu_ia:
    build: ./python_games
    volumes:
      - ./python_games/games/jeuxReelvsIA:/app
    command: streamlit run jeu.py --server.port 8501 --server.baseUrlPath /jeu
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: always

  # --- JEU 2 : QUIZ ---
  quiz_histoire:
    build: ./python_games
    volumes:
      - ./python_games/games/quizhistoireIA:/app
    command: streamlit run quizHistoireIA.py --server.port 8502 --server.baseUrlPath /quiz
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: always

  # --- BACKEND NODE (OpenAI image detection) ---
  backend_node:
    build: ./backend_node
    container_name: backend_node
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3000
    restart: always

  # --- SERVEUR WEB NGINX ---
  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - backend_node
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./python_games:/usr/share/nginx/html/python_games
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
