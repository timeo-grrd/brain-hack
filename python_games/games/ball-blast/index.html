<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | HackAThon</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0; width: 100%; height: 100%; overflow: hidden; background: #231F20;">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1" style="width: 100%; height: 100%; background: #231F20; display: block;"></canvas>
    <script src="Build/ball-blast.loader.js"></script>
    <script>
      function reportBallBlastScore(score) {
        var parsedScore = Number(score);
        if (!Number.isFinite(parsedScore)) {
          return;
        }

        if (window.parent && window.parent !== window) {
          window.parent.postMessage(
            {
              type: 'BALL_BLAST_SCORE',
              source: 'ball-blast',
              score: parsedScore,
              sentAt: Date.now()
            },
            '*'
          );
        }
      }

      // Fonction appelee par Unity au Game Over.
      window.reportBallBlastScore = reportBallBlastScore;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "static";

        document.body.style.textAlign = "left";

      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/ball-blast.data.unityweb",
        frameworkUrl: "Build/ball-blast.framework.js.unityweb",
        codeUrl: "Build/ball-blast.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "HackAThon",
        productVersion: "1.0",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
