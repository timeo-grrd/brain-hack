<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | HackAThon</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0; width: 100vw; height: 100vh; overflow: hidden; background: #231F20; display: flex; align-items: center; justify-content: center;">
    
    <div id="game-container" style="width: 900px; height: 1000px; transform-origin: center center;">
      <canvas id="unity-canvas" width="900" height="1000" tabindex="-1" style="width: 100%; height: 100%; background: #231F20; display: block;"></canvas>
    </div>
    
    <script src="Build/ball-blast.loader.js"></script>
    <script>
      // 1) Prevent game from pausing on click outside
      window.addEventListener('blur', function (e) {
        e.stopImmediatePropagation();
      }, true);
      document.addEventListener('visibilitychange', function (e) {
        e.stopImmediatePropagation();
      }, true);

      // 2) Keep the game-container scaled accurately within the iframe window
      function resizeGame() {
        var scale = Math.min(window.innerWidth / 900, window.innerHeight / 1000);
        document.getElementById('game-container').style.transform = 'scale(' + scale + ')';
      }
      window.addEventListener('resize', resizeGame);
      resizeGame();

      function reportBallBlastScore(score) {
        var parsedScore = Number(score);
        if (!Number.isFinite(parsedScore)) return;
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({
            type: 'BALL_BLAST_SCORE', source: 'ball-blast', score: parsedScore, sentAt: Date.now()
          }, '*');
        }
      }
      window.reportBallBlastScore = reportBallBlastScore;

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/ball-blast.data.unityweb",
        frameworkUrl: "Build/ball-blast.framework.js.unityweb",
        codeUrl: "Build/ball-blast.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "HackAThon",
        productVersion: "1.0",
        matchWebGLToCanvasSize: false,
        devicePixelRatio: window.devicePixelRatio || 1,
      }).then((unityInstance) => {
        // Force audio/time to continue playing when losing focus (some unity versions)
        if(unityInstance.Module) {
           // Provide a dummy method to override internal pause
        }
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
